decoder:
  eva_hidden_size: 384
  dino_hidden_size: 384
  hidden_size: 512
  depth: 16
  num_heads: 16
  mlp_ratio: 4.0
  patch_size: 14
  output_image_size: 224
  noise_tau: 0.2

training:
  epochs: 16
  ema_decay: 0.9978
  global_batch_size: 512
  optimizer:
    lr: 2.0e-4
    betas: [0.5, 0.9]
    weight_decay: 0.0
  scheduler:
    type: cosine
    warmup_epochs: 1
    final_lr: 2.0e-5

gan:
  disc:
    arch:
      backbone_model_name: timm/vit_small_patch16_dinov3.lvd1689m
      dino_ckpt_path: null
      input_size: 224
      feature_dim: 384
      ks: 9
      norm_type: gn
      using_spec_norm: true
      freeze_backbone: false
    optimizer:
      lr: 2.0e-4
      betas: [0.5, 0.9]
      weight_decay: 0.0
    augment:
      prob: 0.5
      cutout: 0.0
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      horizontal_flip: true
  loss:
    disc_loss: hinge
    gen_loss: vanilla
    disc_weight: 1.5
    perceptual_weight: 1.0
    adaptive_weight: true
    disc_start: 6
    disc_upd_start: 4
    adversarial_warmup_epochs: 2.0
    lpips_start: 0
    max_d_weight: 2.0
    disc_updates: 1
    r1_weight: 1.0
    r1_interval: 16
